<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>80 Years of Pax Americana (1945-2025)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        :root { 
            --bg: #f8fafc; --text: #0f172a; --panel: #ffffff; --border: #cbd5e1; --unknown: #e2e8f0; --stroke: #94a3b8;
        }
        @media (prefers-color-scheme: dark) {
            :root { 
                --bg: #020617; --text: #f1f5f9; --panel: #0f172a; --border: #1e293b; --unknown: #111827; --stroke: #334155;
            }
        }
        body { background-color: var(--bg); color: var(--text); transition: background-color 0.2s ease; }
        .panel { background-color: var(--panel); border-color: var(--border); }
        .country { stroke: var(--stroke); stroke-width: 0.5px; transition: fill 0.3s ease; cursor: crosshair; }
        .country:hover { stroke-width: 1.2px; stroke: #3b82f6; }
        
        .tooltip {
            position: fixed;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.98);
            color: white;
            padding: 16px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 320px;
            border: 1px solid rgba(255,255,255,0.1);
            line-height: 1.5;
        }
        input[type="range"] { height: 6px; border-radius: 3px; }
        .legend-text { font-weight: 400 !important; font-size: 12px; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body class="font-sans overflow-hidden">

<div class="flex flex-col h-screen">

                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 relative flex overflow-hidden">

            <div class="p-6 overflow-y-auto flex-1 flex flex-col gap-8">

                    <h3 class="text-[10px] uppercase tracking-widest opacity-50 mb-4 font-bold border-b border-slate-500/20 pb-2">Legend</h3>
                    <div class="space-y-3">
                        <div class="flex items-center gap-3"><div class="w-3.5 h-3.5 rounded bg-[#dc2626]"></div><span class="legend-text">Strong alignment</span></div>

                        <div class="flex items-center gap-3 pt-3 border-t border-slate-500/10 opacity-60">
                            <div class="w-3.5 h-3.5 rounded border border-slate-500/30 bg-[var(--unknown)]"></div>
                            <span class="legend-text italic">Unknown / Uncharted</span>
                        </div>
                    </div>
                </section>

                <section class="mt-auto">

                            <span class="flex items-center gap-2">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                                Historical Pulse
                            </span>
                            <span id="pulse-period" class="text-[9px] font-mono text-slate-500 font-normal tracking-tighter bg-white/50 dark:bg-black/50 px-1.5 py-0.5 rounded border border-slate-500/20">[----]</span>
                        </h4>
                        <p id="insight-text" class="text-[12px] leading-relaxed opacity-90 text-justify">Initializing structural analysis...</p>
                    </div>
                </section>
            </div>
        </div>

        <!-- Map Container -->
        <div id="map-container" class="flex-1 relative bg-[var(--unknown)]">
            <svg id="map" class="w-full h-full"></svg>
            <div id="tooltip" class="tooltip"></div>
        </div>
    </main>

    <!-- Timeline Footer -->
    <footer class="panel border-t px-10 py-6 shrink-0 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <input type="range" id="year-slider" min="1945" max="2025" value="1945" step="1" class="w-full bg-slate-400/20 rounded-lg appearance-none cursor-pointer accent-red-600 focus:outline-none">
        <div class="flex justify-between text-[11px] opacity-50 mt-4 font-mono font-bold">
            <span>1945</span><span>1955</span><span>1965</span><span>1975</span><span>1985</span><span>1995</span><span>2005</span><span>2015</span><span>2025</span>
        </div>
    </footer>
</div>

    const yearInsightsKeys = Object.keys(yearInsights).map(Number).sort((a,b)=>a-b);

    function getCountryPeriod(iso, targetYear) {
        let start = 1945;
        let end = 2025;
        let targetStatus = "Unknown";
        let targetReason = "";
        for (let y = 1945; y <= targetYear; y++) {
            if (timelineData[y]) {
                for (const [status, groups] of Object.entries(timelineData[y])) {
                    for (const group of groups) {
                        if (group.codes.includes(iso)) {
                            targetStatus = status;
                            targetReason = group.reason;
                            start = y;
                        }
                    }
                }
            }
        }
        for (let y = targetYear + 1; y <= 2025; y++) {
            if (timelineData[y]) {
                for (const [status, groups] of Object.entries(timelineData[y])) {
                    for (const group of groups) {
                        if (group.codes.includes(iso)) {
                            return { start, end: y - 1, status: targetStatus, reason: targetReason };
                        }
                    }
                }
            }
        }
        return { start, end, status: targetStatus, reason: targetReason };
    }

    function getInsightPeriod(targetYear) {
        let start = 1945;
        let end = 2025;
        let text = "Mapping structural dynamics...";
        for (let i = 0; i < yearInsightsKeys.length; i++) {
            if (yearInsightsKeys[i] <= targetYear) {
                start = yearInsightsKeys[i];
                text = yearInsights[yearInsightsKeys[i]];
                end = (i + 1 < yearInsightsKeys.length) ? yearInsightsKeys[i+1] - 1 : 2025;
            }
        }
        return { start, end, text };
    }

    async function init() {
        const container = document.getElementById('map-container');
        const world = await d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json");
        geoData = topojson.feature(world, world.objects.countries).features;
        const projection = d3.geoNaturalEarth1().scale(container.clientWidth / 5.2).translate([container.clientWidth / 2.1, container.clientHeight / 1.6]);
        const path = d3.geoPath().projection(projection);
        d3.select("#map").selectAll("path").data(geoData).enter().append("path")
            .attr("d", path).attr("class", "country").attr("fill", COLORS.Unknown)
            .on("mouseover", showTooltip).on("mousemove", moveTooltip).on("mouseout", hideTooltip);
        setupControls();
        updateMap(1945);
    }

    function setupControls() {
        const slider = document.getElementById('year-slider');
        const playBtn = document.getElementById('play-pause');
        slider.oninput = (e) => { currentYear = parseInt(e.target.value); updateMap(currentYear); if (isPlaying) pause(); };
        playBtn.onclick = () => isPlaying ? pause() : play();
        document.getElementById('step-back').onclick = () => { if (isPlaying) pause(); if (currentYear > 1945) { currentYear--; slider.value = currentYear; updateMap(currentYear); } };
        document.getElementById('step-forward').onclick = () => { if (isPlaying) pause(); if (currentYear < 2025) { currentYear++; slider.value = currentYear; updateMap(currentYear); } };
        function play() { isPlaying = true; document.getElementById('play-icon').classList.add('hidden'); document.getElementById('pause-icon').classList.remove('hidden'); interval = setInterval(() => { if (currentYear >= 2025) return pause(); currentYear++; slider.value = currentYear; updateMap(currentYear); }, 800); }
        function pause() { isPlaying = false; document.getElementById('play-icon').classList.remove('hidden'); document.getElementById('pause-icon').classList.add('hidden'); clearInterval(interval); }
    }

    function getCumulativeData(year) {
        const state = {};
        for (let y = 1945; y <= year; y++) {
            if (timelineData[y]) {
                Object.entries(timelineData[y]).forEach(([status, groups]) => {
                    groups.forEach(group => group.codes.forEach(code => state[code] = { status, reason: group.reason }));
                });
            }
        }
        return state;
    }

    function updateMap(year) {
        document.getElementById('year-display').innerText = year;
        const activeStates = getCumulativeData(year);
        d3.selectAll(".country").transition().duration(200).attr("fill", d => {
            const iso = ISO_MAP[d.id] || NAME_TO_ISO[d.properties.name];
            if (iso === "USA") return COLORS["Strong alignment"];
            if (iso === "GRL") return COLORS[activeStates["DNK"]?.status || "Unknown"];
            return COLORS[activeStates[iso]?.status || "Unknown"];
        });
        const insight = getInsightPeriod(year);
        document.getElementById('insight-text').innerText = insight.text;
        document.getElementById('pulse-period').innerText = `[${insight.start} - ${insight.end}]`;
    }

    function showTooltip(event, d) {
        const iso = ISO_MAP[d.id] || NAME_TO_ISO[d.properties.name];
        let queryIso = iso; if (iso === "GRL") queryIso = "DNK";
        const periodData = getCountryPeriod(queryIso, currentYear);
        const status = iso === "USA" ? "Strong alignment" : (periodData.status || "Unknown");
        const reason = iso === "USA" ? "The imperial core. The United States utilizes dollar hegemony, overwhelming naval supremacy, and a vast network of military bases to enforce a global security architecture favorable to its capital interests." : (periodData.reason || "State data carried forward from established baseline.");
        d3.select("#tooltip").style("display", "block").html(`
            <div class='font-bold text-white mb-1.5 text-sm border-b border-slate-600 pb-1 flex justify-between items-center'>
                <span>${d.properties.name} <span class='text-[9px] font-mono text-slate-400 font-normal'>[${iso || '??'}]</span></span>
                <span class='text-[9px] font-mono text-slate-400 bg-white/10 px-1 py-0.5 rounded'>${periodData.start} - ${periodData.end}</span>
            </div>
            <div class='flex items-center gap-2 mb-2'>
                <div class='w-2.5 h-2.5 rounded-sm shadow-sm' style='background-color:${COLORS[status]||'#ccc'}'></div>
                <span class='font-semibold tracking-wide' style='color:${COLORS[status]||'#ccc'}'>${status}</span>
            </div>
            <p class='text-xs text-slate-200'>${reason}</p>
        `);
    }

    function moveTooltip(event) { 
        let x = event.clientX + 20; let y = event.clientY + 20; 
        if (x + 340 > window.innerWidth) x = event.clientX - 340; 
        if (y + 150 > window.innerHeight) y = event.clientY - 150;
        d3.select("#tooltip").style("left", x + 'px').style("top", y + 'px'); 
    }
    function hideTooltip() { d3.select("#tooltip").style("display", "none"); }
